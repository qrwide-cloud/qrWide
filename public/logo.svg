<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 44" fill="none">
  <defs>
    <linearGradient id="wGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#0057FF"/>
      <stop offset="50%"  stop-color="#0099CC"/>
      <stop offset="100%" stop-color="#00C896"/>
    </linearGradient>
  </defs>

  <!-- W mark background (44×30 scaled to 64×44 with padding) -->
  <rect width="64" height="44" rx="10" fill="url(#wGrad)"/>

  <!-- A — top-left peak -->
  <rect x="5"  y="5"  width="13" height="13" rx="3.5" fill="white"/>
  <rect x="8.5" y="8.5" width="6" height="6" rx="1.5" fill="rgba(0,87,255,0.65)"/>

  <!-- B — lower-left valley -->
  <rect x="19" y="24" width="13" height="13" rx="3.5" fill="white"/>
  <rect x="22.5" y="27.5" width="6" height="6" rx="1.5" fill="rgba(255,255,255,0.4)"/>

  <!-- C — lower-right valley -->
  <rect x="34" y="24" width="13" height="13" rx="3.5" fill="white"/>
  <rect x="37.5" y="27.5" width="6" height="6" rx="1.5" fill="rgba(255,255,255,0.4)"/>

  <!-- D — top-right peak -->
  <rect x="49" y="5"  width="13" height="13" rx="3.5" fill="white"/>
  <rect x="52.5" y="8.5" width="6" height="6" rx="1.5" fill="rgba(0,200,150,0.65)"/>

  <!-- Wordmark -->
  <text x="74" y="31" font-family="system-ui,-apple-system,sans-serif"
        font-size="26" font-weight="800" letter-spacing="-0.6" fill="#0d1117">QRWide</text>
</svg>
